<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>19位序號定格掃描器</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --panel-bg: rgba(28, 28, 30, 0.95);
            --accent: #00e676;
            --text: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; overflow: hidden; }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        /* 增加一個隱藏的圖片層用來做定格效果 */
        #freeze-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 2; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }

        .top-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        .status-badge { background: rgba(0,0,0,0.7); color: var(--accent); padding: 8px 16px; border-radius: 20px; font-size: 13px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        .bottom-sheet { position: absolute; bottom: 0; width: 100%; height: 40%; background: var(--panel-bg); backdrop-filter: blur(25px); border-radius: 24px 24px 0 0; display: flex; flex-direction: column; z-index: 10; border-top: 1px solid rgba(255,255,255,0.2); }
        .handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; margin: 12px auto; }

        .controls { padding: 0 20px 15px; display: flex; gap: 12px; }
        #scan-btn { flex: 5; background: var(--accent); border: none; padding: 16px; border-radius: 16px; font-weight: bold; font-size: 16px; color: #000; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); }
        #scan-btn.frozen { background: #555; color: white; }
        #clear-btn { flex: 1; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 16px; font-size: 18px; }

        #result-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .code-item { background: rgba(255,255,255,0.06); margin-bottom: 10px; padding: 14px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .code-text { color: var(--accent); font-family: monospace; font-size: 16px; font-weight: bold; }
        .item-actions { display: flex; gap: 8px; }
        .mini-btn { background: rgba(255,255,255,0.12); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
        .copy-btn.success { background: var(--accent); color: black; }

        canvas#temp-canvas { display: none; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <img id="freeze-frame">
        <canvas id="overlay-canvas"></canvas>
    </div>

    <div class="top-bar">
        <div class="status-badge" id="status">準備掃描 (19 位含 - 格式)</div>
    </div>

    <div class="bottom-sheet">
        <div class="handle"></div>
        <div class="controls">
            <button id="scan-btn">📷 拍下並掃描</button>
            <button id="clear-btn" title="清空全部">🗑️</button>
        </div>
        <div id="result-list"></div>
    </div>

    <canvas id="temp-canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const freezeFrame = document.getElementById('freeze-frame');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const tempCanvas = document.getElementById('temp-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultList = document.getElementById('result-list');
        const statusBadge = document.getElementById('status');

        let scannedSet = new Set();
        let worker = null;
        let isFrozen = false;

        async function initWorker() {
            statusBadge.innerText = "載入中...";
            worker = await Tesseract.createWorker('eng');
            statusBadge.innerText = "✅ 就緒";
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => resizeCanvas();
        }

        function resizeCanvas() {
            overlayCanvas.width = window.innerWidth;
            overlayCanvas.height = window.innerHeight;
        }

        scanBtn.onclick = async () => {
            if (isFrozen) {
                // 如果是定格狀態，點擊則恢復相機
                unfreeze();
                return;
            }

            if (!worker) await initWorker();
            
            // 執行定格
            freeze();
            statusBadge.innerText = "🔍 正在分析定格畫面...";
            scanBtn.disabled = true;

            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tCtx.drawImage(video, 0, 0);

            const { data } = await worker.recognize(tempCanvas);
            
            // 座標比例換算
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const screenRatio = window.innerWidth / window.innerHeight;
            const videoRatio = vWidth / vHeight;
            let scale, offsetX = 0, offsetY = 0;
            if (screenRatio > videoRatio) {
                scale = window.innerWidth / vWidth;
                offsetY = (window.innerHeight - vHeight * scale) / 2;
            } else {
                scale = window.innerHeight / vHeight;
                offsetX = (window.innerWidth - vWidth * scale) / 2;
            }

            const ctx = overlayCanvas.getContext('2d');
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            let count = 0;
            data.words.forEach(word => {
                // 🔍 修改為 19 位
                const codeMatch = word.text.match(/[A-Z0-9-]{19}/);
                if (codeMatch) {
                    count++;
                    const cleanCode = codeMatch[0];
                    const { x0, y0, x1, y1 } = word.bbox;
                    
                    // 繪製 Highlight
                    ctx.fillStyle = 'rgba(0, 230, 118, 0.3)';
                    ctx.strokeStyle = '#00e676';
                    ctx.lineWidth = 2;
                    const rx = x0 * scale + offsetX;
                    const ry = y0 * scale + offsetY;
                    const rw = (x1 - x0) * scale;
                    const rh = (y1 - y0) * scale;
                    ctx.fillRect(rx, ry, rw, rh);
                    ctx.strokeRect(rx, ry, rw, rh);

                    addCode(cleanCode);
                }
            });

            statusBadge.innerText = count > 0 ? `偵測到 ${count} 組，點擊按鈕返回相機` : "未發現序號，點擊按鈕重拍";
            scanBtn.disabled = false;
        };

        function freeze() {
            // 擷取當前影格並顯示
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tCtx.drawImage(video, 0, 0);
            freezeFrame.src = tempCanvas.toDataURL('image/jpeg');
            freezeFrame.style.display = 'block';
            isFrozen = true;
            scanBtn.innerText = "🔄 返回相機";
            scanBtn.classList.add('frozen');
        }

        function unfreeze() {
            freezeFrame.style.display = 'none';
            const ctx = overlayCanvas.getContext('2d');
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            isFrozen = false;
            scanBtn.innerText = "📷 拍下並掃描";
            scanBtn.classList.remove('frozen');
            statusBadge.innerText = "準備就緒";
        }

        function addCode(code) {
            if (scannedSet.has(code)) return;
            scannedSet.add(code);
            const div = document.createElement('div');
            div.className = 'code-item';
            div.id = `item-${code}`;
            div.innerHTML = `<span class="code-text">${code}</span><div class="item-actions">
                <button class="mini-btn copy-btn" onclick="copyCode('${code}')">複製</button>
                <button class="mini-btn" onclick="deleteCode('${code}')">🗑️</button>
            </div>`;
            resultList.appendChild(div);
            resultList.scrollTop = resultList.scrollHeight;
        }

        window.copyCode = (code) => {
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector(`#item-${code} .copy-btn`);
                btn.innerText = "OK!";
                btn.classList.add('success');
                setTimeout(() => { btn.innerText = "複製"; btn.classList.remove('success'); }, 1000);
            });
        };

        window.deleteCode = (code) => {
            scannedSet.delete(code);
            document.getElementById(`item-${code}`).remove();
        };

        clearBtn.onclick = () => { if(confirm("清空？")) { scannedSet.clear(); resultList.innerHTML = ''; } };

        startCamera();
        initWorker();
    </script>
</body>
</html>
