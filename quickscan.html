<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Serial Scan Studio v11</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --bg: #ffffff; /* 背景改為純白 */
            --card: #f8f9fa; /* 卡片使用極淺灰 */
            --accent: #6f42c1; /* 主要配色改為紫色 (Bootstrap Purple) */
            --text: #212529; /* 文字改為深灰/黑 */
            --border: #dee2e6; /* 邊框顏色 */
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); overflow: hidden; }

        /* 主顯示區 */
        #main-viewer { position: relative; width: 100%; height: 50%; background: #f1f3f5; overflow: hidden; border-bottom: 1px solid var(--border); }
        #video, #freeze-frame { width: 100%; height: 100%; object-fit: contain; }
        /* 🎨 移除 Highlight：不再需要 overlay-canvas */
        #overlay-canvas { display: none; }

        /* 狀態列 */
        .status-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 10; pointer-events: none; }
        .badge { background: rgba(255,255,255,0.8); color: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--accent); backdrop-filter: blur(5px); font-weight: bold; }

        /* 底部控制面板 */
        .dashboard { position: absolute; bottom: 0; width: 100%; height: 50%; background: var(--bg); display: flex; flex-direction: column; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); border-top: 1px solid var(--border); }
        
        /* 檔案預覽滑軌 */
        .gallery-tray { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); height: 80px; align-items: center; }
        .gallery-tray::-webkit-scrollbar { height: 4px; }
        .gallery-tray::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        
        .thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; opacity: 0.6; border: 2px solid transparent; transition: 0.3s; flex-shrink: 0; cursor: pointer; }
        .thumb.active { opacity: 1; border-color: var(--accent); transform: scale(1.05); }

        /* 控制按鈕 */
        .action-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; padding: 15px; }
        button { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        button:active { transform: scale(0.98); }

        /* 🎨 按鈕改為紫色 */
        #scan-btn { background: var(--accent); color: #ffffff; padding: 16px; font-size: 16px; box-shadow: 0 4px 10px rgba(111, 66, 193, 0.2); }
        #upload-btn { background: #e9ecef; color: var(--text); padding: 16px; }
        #upload-btn:hover { background: #dee2e6; }
        
        #clear-btn { background: transparent; color: #dc3545; font-size: 12px; padding: 5px; text-decoration: underline; margin-top: 5px; }

        /* 結果清單 */
        #result-list { flex: 1; overflow-y: auto; padding: 0 15px 15px; }
        .list-header { font-size: 12px; color: #6c757d; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .code-row { background: var(--card); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 🎨 Code 文字也用紫色 */
        .code-val { font-family: 'Courier New', monospace; font-size: 15px; color: var(--accent); font-weight: bold; letter-spacing: 0.5px; }
        .btn-group { display: flex; gap: 6px; }
        
        .btn-sm { background: #ffffff; color: var(--text); padding: 7px 12px; border-radius: 8px; font-size: 12px; border: 1px solid var(--border); font-weight: 500; }
        .btn-sm:hover { background: #f8f9fa; border-color: #adb5bd; }
        .btn-sm.saved { background: var(--accent); color: #ffffff; border-color: var(--accent); }
        
        #file-input { display: none; }
        canvas#temp-canvas { display: none; }
    </style>
</head>
<body>

<div id="main-viewer">
    <video id="video" autoplay playsinline></video>
    <img id="freeze-frame" style="display:none;">
    <canvas id="overlay-canvas"></canvas>
    <div class="status-bar"><div class="badge" id="status">準備就緒</div></div>
</div>

<div class="dashboard">
    <div class="gallery-tray" id="gallery-tray">
        <span style="color:#adb5bd; font-size:12px; margin-left:10px;">尚未上傳圖片...</span>
    </div>

    <div class="action-grid">
        <button id="scan-btn">📷 拍照 / 掃描當前</button>
        <button id="upload-btn">📂 批次上傳</button>
        <div style="grid-column: span 2; text-align: center;">
            <button id="clear-btn">清空所有記錄</button>
        </div>
    </div>

    <div id="result-list">
        <div class="list-header">
            <span>掃描結果 (含 - 的 19 位序號)</span>
            <span id="result-count">0 組</span>
        </div>
        </div>
</div>

<input type="file" id="file-input" multiple accept="image/*">
<canvas id="temp-canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const freezeFrame = document.getElementById('freeze-frame');
    // overlayCanvas 仍保留在 JS 中，但 CSS 已隱藏
    const overlayCanvas = document.getElementById('overlay-canvas');
    const tempCanvas = document.getElementById('temp-canvas');
    const scanBtn = document.getElementById('scan-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const fileInput = document.getElementById('file-input');
    const galleryTray = document.getElementById('gallery-tray');
    const resultList = document.getElementById('result-list');
    const statusBadge = document.getElementById('status');
    const resultCount = document.getElementById('result-count');

    let scannedSet = new Set();
    let worker = null;
    let isFrozen = false;

    async function initWorker() {
        statusBadge.innerText = "載入 AI 引擎...";
        worker = await Tesseract.createWorker('eng');
        await worker.setParameters({ tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-' });
        statusBadge.innerText = "引擎已就緒";
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } } });
            video.srcObject = stream;
        } catch (e) {
            statusBadge.innerText = "無法開啟相機";
        }
    }

    // 處理圖片掃描
    async function performOcr(source) {
        if (!worker) await initWorker();
        statusBadge.innerText = "正在掃描...";
        
        const tCtx = tempCanvas.getContext('2d');
        const w = source.videoWidth || source.naturalWidth;
        const h = source.videoHeight || source.naturalHeight;
        tempCanvas.width = w; tempCanvas.height = h;
        
        // 保持強化對比，這能提高準確率
        tCtx.filter = 'grayscale(100%) contrast(180%) brightness(100%)';
        tCtx.drawImage(source, 0, 0);

        const { data } = await worker.recognize(tempCanvas);
        
        // 🎨 移除 Highlight：不再需要繪製高亮框
        /*
        const ctx = overlayCanvas.getContext('2d');
        overlayCanvas.width = window.innerWidth;
        overlayCanvas.height = window.innerHeight;
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        */

        let count = 0;
        data.words.forEach(word => {
            let text = word.text.toUpperCase().replace(/S/g, '5').replace(/Q/g, '0');
            // 驗證邏輯不變
            if (/^[A-Z0-9-]{19}$/.test(text) && /[0-9]/.test(text) && /[A-Z]/.test(text)) {
                count++;
                addResult(text);
            }
        });
        statusBadge.innerText = count > 0 ? `掃描完成，找到 ${count} 組` : "未發現序號";
        scanBtn.disabled = false;
        updateCount();
    }

    // 批次上傳處理
    fileInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        galleryTray.innerHTML = ""; // 清空舊預覽
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.createElement('img');
                img.src = ev.target.result;
                img.className = 'thumb';
                img.onclick = () => {
                    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                    img.classList.add('active');
                    switchToImage(img.src);
                };
                galleryTray.appendChild(img);
                if (index === 0) img.click(); // 自動載入第一張
            };
            reader.readAsDataURL(file);
        });
    };

    function switchToImage(src) {
        video.style.display = 'none';
        freezeFrame.src = src;
        freezeFrame.style.display = 'block';
        isFrozen = true;
        scanBtn.innerText = "🔄 重新掃描當前 / 返回相機";
        
        freezeFrame.onload = () => performOcr(freezeFrame);
    }

    function unfreeze() {
        video.style.display = 'block';
        freezeFrame.style.display = 'none';
        isFrozen = false;
        scanBtn.innerText = "📷 拍照掃描";
        statusBadge.innerText = "相機模式";
    }

    scanBtn.onclick = () => {
        if (isFrozen) {
            if (freezeFrame.style.display === 'block') {
                performOcr(freezeFrame); // 再次掃描當前圖片
                setTimeout(() => { if(confirm("要返回實時相機嗎？")) unfreeze(); }, 300);
            } else {
                unfreeze();
            }
        } else {
            // 拍照掃描邏輯
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tCtx.drawImage(video, 0, 0);
            switchToImage(tempCanvas.toDataURL());
        }
    };

    uploadBtn.onclick = () => fileInput.click();

    function addResult(code) {
        if (scannedSet.has(code)) return;
        scannedSet.add(code);
        const div = document.createElement('div');
        div.className = 'code-row';
        div.id = `c-${code}`;
        div.innerHTML = `<span class="code-val">${code}</span><div class="btn-group">
            <button class="btn-sm" onclick="copyC('${code}')">複製</button>
            <button class="btn-sm" onclick="delC('${code}')">🗑️</button>
        </div>`;
        // 將新的結果放到最上面，方便查看
        resultList.insertBefore(div, resultList.firstChild.nextSibling);
    }

    function updateCount() {
        resultCount.innerText = `${scannedSet.size} 組`;
    }

    window.copyC = (c) => {
        navigator.clipboard.writeText(c).then(() => {
            const b = document.querySelector(`#c-${c} .btn-sm`);
            b.innerText = "已複製";
            b.classList.add('saved');
            setTimeout(() => {
                b.innerText = "複製";
                b.classList.remove('saved');
            }, 1000);
        });
    };

    window.delC = (c) => { 
        scannedSet.delete(c); 
        document.getElementById(`c-${c}`).remove(); 
        updateCount();
    };
    
    clearBtn.onclick = () => { 
        if(confirm("確定清除所有記錄？")) { 
            scannedSet.clear(); 
            // 保留 header
            resultList.innerHTML = '<div class="list-header"><span>掃描結果 (含 - 的 19 位序號)</span><span id="result-count">0 組</span></div>';
            updateCount();
        }
    };

    startCamera();
    initWorker();
</script>
</body>
</html>
